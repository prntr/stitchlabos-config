# Source of truth for embroidery macros (stitchlabos)
#
# Model:
# - 1 full handwheel rotation = 5mm Z travel = 1 complete stitch
# - UP positions: Z = 0, 5, 10, 15, ...
# - DOWN positions: Z = 2.5, 7.5, 12.5, 17.5, ...
# - During stitching we only advance Z forward

[gcode_macro _EMBROIDERY_VARS]
description: Internal variables for embroidery state tracking
variable_saved_position: 0.0
variable_z_before_needle_move: 0.0
gcode:
    # Variables only

[gcode_macro NEEDLE_TOGGLE]
description: Toggle needle between UP and DOWN for maintenance (restores Z with G92)
gcode:
    # Use gcode_position (logical position after G92), not toolhead.position (physical)
    {% set current_z = printer.gcode_move.gcode_position.z %}
    {% set feedrate = (printer.configfile.settings.printer.max_z_velocity * 60)|float %}
    {% set max_z = printer.configfile.settings.stepper_z.position_max|float %}

    {% set z_mod = (current_z % 5.0)|round(2) %}
    {% set is_needle_up = (z_mod < 0.5 or z_mod > 4.5) %}
    {% set is_needle_down = (z_mod >= 2.0 and z_mod <= 3.0) %}

    {% set full_rotations = (current_z / 5.0)|int %}
    {% set up_position = full_rotations * 5.0 %}
    {% set down_position = full_rotations * 5.0 + 2.5 %}

    {% if not is_needle_up and not is_needle_down %}
        {% if z_mod > 2.5 %}
            {% set up_position = (full_rotations + 1) * 5.0 %}
        {% endif %}
    {% endif %}

    {% if is_needle_down %}
        { action_respond_info("Needle DOWN at Z=%.2fmm. Moving to UP for maintenance" % current_z) }
        G90
        G1 Z{up_position} F{feedrate}
        M400
        G4 P50
        G92 Z{current_z}
    {% elif is_needle_up %}
        {% if down_position > max_z %}
            { action_raise_error("Cannot move to DOWN position Z=%.2f - exceeds max Z=%.2f" % (down_position, max_z)) }
        {% else %}
            { action_respond_info("Needle UP at Z=%.2fmm. Moving to DOWN for maintenance" % current_z) }
            G90
            G1 Z{down_position} F{feedrate}
            M400
            G4 P50
            G92 Z{current_z}
        {% endif %}
    {% else %}
        { action_respond_info("Needle between positions at Z=%.2fmm. Moving to UP" % current_z) }
        G90
        G1 Z{up_position} F{feedrate}
        M400
        G4 P50
        G92 Z{current_z}
    {% endif %}

[gcode_macro STITCH]
description: Perform one complete rotation (5mm) without changing logical Z position
gcode:
    # Use gcode_position (logical position after G92), not toolhead.position (physical)
    {% set current_z = printer.gcode_move.gcode_position.z %}
    {% set physical_z = printer.toolhead.position.z %}
    {% set feedrate = (printer.configfile.settings.printer.max_z_velocity * 60)|float %}
    {% set max_z = printer.configfile.settings.stepper_z.position_max|float %}
    {% set target_z = physical_z + 5.0 %}

    {% if target_z > max_z %}
        { action_raise_error("Cannot stitch: target Z=%.2f exceeds max Z=%.2f" % (target_z, max_z)) }
    {% else %}
        { action_respond_info("STITCH: Moving 5mm (one rotation), restoring Z=%.2fmm" % current_z) }
        G91
        G1 Z5 F{feedrate}
        M400
        G90
        # Restore logical Z position
        G92 Z{current_z}
    {% endif %}

[gcode_macro LOCK_STITCH]
description: Lock stitch - performs multiple rotations (default 3) without changing logical Z
gcode:
    {% set current_z = printer.gcode_move.gcode_position.z %}
    {% set physical_z = printer.toolhead.position.z %}
    {% set feedrate = (printer.configfile.settings.printer.max_z_velocity * 60)|float %}
    {% set max_z = printer.configfile.settings.stepper_z.position_max|float %}
    {% set num_stitches = params.COUNT|default(3)|int %}
    {% set total_move = num_stitches * 5.0 %}
    {% set target_z = physical_z + total_move %}

    {% if target_z > max_z %}
        { action_raise_error("Cannot lock stitch: target Z=%.2f exceeds max Z=%.2f" % (target_z, max_z)) }
    {% else %}
        { action_respond_info("LOCK_STITCH: Moving %dmm (%d rotations), restoring Z=%.2fmm" % (total_move, num_stitches, current_z)) }
        G91
        G1 Z{total_move} F{feedrate}
        M400
        G90
        # Restore logical Z position
        G92 Z{current_z}
    {% endif %}

[gcode_macro NEEDLE_ADJUST]
description: Fine-tune needle position by specific amount in mm
gcode:
    {% set AMOUNT = params.AMOUNT|default(0.1)|float %}
    {% set feedrate = (printer.configfile.settings.printer.max_z_velocity * 60) / 2 %}

    SAVE_GCODE_STATE NAME=NEEDLE_ADJUST_STATE
    G91
    G1 Z{AMOUNT} F{feedrate}
    RESTORE_GCODE_STATE NAME=NEEDLE_ADJUST_STATE MOVE=0

[gcode_macro EMBROIDERY_HOME]
description: Home embroidery machine - XY first, then Z (needle to UP)
gcode:
    {% set x_center = printer.configfile.settings.stepper_x.position_max / 2 %}
    {% set y_center = printer.configfile.settings.stepper_y.position_max / 2 %}

    G28 X Y
    G28 Z

    G90
    G1 X{x_center} Y{y_center} F6000

[gcode_macro ZERO_NEEDLE_POSITION]
description: Move needle to UP position, then set Z=0
gcode:
    {% set physical_z = printer.toolhead.position.z %}
    {% set feedrate = (printer.configfile.settings.printer.max_z_velocity * 60)|float %}

    # Calculate distance to next UP position (multiple of 5mm)
    {% set z_mod = physical_z % 5.0 %}
    {% if z_mod < 0.1 %}
        # Already at UP position
        { action_respond_info("ZERO: Already at UP position, setting Z=0") }
    {% else %}
        # Move to next UP position
        {% set move_to_up = 5.0 - z_mod %}
        { action_respond_info("ZERO: Moving %.2fmm to UP position, then setting Z=0" % move_to_up) }
        G91
        G1 Z{move_to_up} F{feedrate}
        M400
        G90
    {% endif %}
    G92 Z0

[gcode_macro EMBROIDERY_STATUS]
description: Display current embroidery machine status with needle state
gcode:
    {% set z_pos = printer.toolhead.position.z %}
    {% set stitch_count = (z_pos / 5.0)|int %}
    {% set x_pos = printer.toolhead.position.x %}
    {% set y_pos = printer.toolhead.position.y %}
    {% set homed = printer.toolhead.homed_axes %}

    {% set z_mod = z_pos % 5.0 %}
    {% if z_mod < 0.5 or z_mod > 4.5 %}
        {% set needle_state = "UP (0°)" %}
    {% elif z_mod > 1.5 and z_mod < 3.5 %}
        {% set needle_state = "DOWN (180°)" %}
    {% else %}
        {% set needle_state = "BETWEEN (%.0f°)" % ((z_mod / 5.0) * 360) %}
    {% endif %}

    { action_respond_info("=== Embroidery Machine Status ===") }
    { action_respond_info("Needle Position (Z): %.2fmm" % z_pos) }
    { action_respond_info("Needle State: %s" % needle_state) }
    { action_respond_info("Stitch Count: %d (%.2f rotations)" % (stitch_count, z_pos / 5.0)) }
    { action_respond_info("XY Position: X=%.2f Y=%.2f" % (x_pos, y_pos)) }
    { action_respond_info("Homed Axes: %s" % homed) }
    { action_respond_info("================================") }
